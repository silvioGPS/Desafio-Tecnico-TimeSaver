services:
  web:
    image: desafio-tecnico-timesaver-backend:local
    build: ./backend
    command: python wsgi.py
    ports:
      - "5000:5000"
    environment:
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-change-this-secret}
      DATABASE_PATH: ${DATABASE_PATH:-instance/agenda_medica.sqlite3}
      APPOINTMENTS_API_URL: ${APPOINTMENTS_API_URL:-http://api:5001/appointments}
      APPOINTMENTS_API_TIMEOUT: ${APPOINTMENTS_API_TIMEOUT:-5}
      WEB_HOST: ${WEB_HOST:-0.0.0.0}
      WEB_PORT: ${WEB_PORT:-5000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./backend/instance:/app/instance
    depends_on:
      - api

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - web

  api:
    image: desafio-tecnico-timesaver-backend:local
    build: ./backend
    command: python mock_api/app.py
    ports:
      - "5001:5001"
    environment:
      APPOINTMENTS_API_MODE: ${APPOINTMENTS_API_MODE:-normal}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-5001}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}